<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .hidden-section { display: none; }
    .form-container { transition: all 0.5s ease; margin-top: 20px; }
    .btn-main { height: 80px; font-size: 1.1rem; font-weight: bold; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; }
    .new-entry-card { border-top: 8px solid #198754; }
    .update-card { border-top: 8px solid #ffc107; }
    
    @media print {
      .no-print { display: none !important; }
    }

    .action-btn { padding: 2px 8px; font-size: 0.85rem; }
    table { font-size: 0.9rem; }
  </style>
</head>
<body class="bg-light p-4">

  <div class="container text-center no-print">
    <h3 class="mb-4 fw-bold text-dark text-uppercase">Customer Management System</h3>
    
    <div class="row justify-content-center g-3">
      <div class="col-md-4">
        <button class="btn btn-success w-100 btn-main shadow" onclick="toggleForm('NEW')">
          <i class="fas fa-plus-circle"></i> <span>ADD NEW CUSTOMER</span>
        </button>
      </div>
      <div class="col-md-4">
        <button class="btn btn-warning w-100 btn-main shadow text-dark" onclick="toggleForm('UPDATE')">
          <i class="fas fa-user-edit"></i> <span>UPDATE EXISTING</span>
        </button>
      </div>
      <div class="col-md-4">
        <button id="printBtn" class="btn btn-primary w-100 btn-main shadow" onclick="openPrintWindow()">
          <i class="fas fa-print"></i> <span>VIEW & PRINT LIST</span>
        </button>
      </div>
    </div>

    <!-- ফর্ম সেকশন -->
    <div id="formSection" class="form-container hidden-section text-start">
      <div id="cardTheme" class="card shadow-lg p-4">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
          <h4 id="formTitle" class="mb-0">FORM</h4>
          <button type="button" class="btn-close" onclick="closeForm()"></button>
        </div>

        <div class="row g-3">
          <div id="searchContainer" class="col-md-12 bg-warning bg-opacity-10 p-3 rounded mb-3 hidden-section border border-warning">
            <label class="fw-bold text-dark small"><i class="fas fa-search"></i> SEARCH BY NAME OR ID</label>
            <input type="text" id="cSearch" class="form-control form-control-lg shadow-sm" list="customerList" placeholder="টাইপ করুন..." oninput="autoFill(this.value)">
            <datalist id="customerList"></datalist>
          </div>

          <div class="col-md-3">
            <label class="fw-bold small">CUSTOMER ID</label>
            <input type="text" id="cCode" class="form-control fw-bold bg-white" readonly>
          </div>
          <div class="col-md-5"><label class="fw-bold small">NAME</label><input type="text" id="cName" class="form-control shadow-sm"></div>
          <div class="col-md-4"><label class="fw-bold small">MOBILE</label><input type="text" id="cMob" class="form-control shadow-sm"></div>
          <div class="col-md-4"><label class="fw-bold small">AREA</label><input type="text" id="cArea" class="form-control shadow-sm"></div>
          <div class="col-md-8"><label class="fw-bold small">ADDRESS</label><input type="text" id="cAddr" class="form-control shadow-sm"></div>
          
          <div class="col-md-6">
            <label class="fw-bold small">TYPE</label>
            <select id="cType" class="form-select shadow-sm"><option value="Retail">Retail</option><option value="Wholesale">Wholesale</option></select>
          </div>
          <div class="col-md-6">
            <label class="fw-bold small">PAYMENT</label>
            <select id="cPay" class="form-select shadow-sm"><option value="Cash">Cash</option><option value="Due">Due</option></select>
          </div>

          <div class="col-md-12 text-end mt-4 pt-3 border-top">
            <button class="btn btn-secondary px-4 me-2" onclick="closeForm()">CANCEL</button>
            <button id="submitBtn" class="btn btn-lg px-5 shadow text-white fw-bold"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
    let allCustomers = [];
    let currentMode = "";

    function openPrintWindow() {
      const btn = document.getElementById('printBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> LOADING...';

      google.script.run
        .withSuccessHandler(data => {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-print"></i> VIEW & PRINT LIST';

          if (!data || data.length === 0) {
            alert("শিটে কোনো কাস্টমার ডাটা পাওয়া যায়নি!");
            return;
          }

          const printWindow = window.open('', '_blank');
          if (!printWindow) {
            alert("পপ-আপ ব্লক করা হয়েছে! দয়া করে ব্রাউজারের অ্যাড্রেস বারের ডান পাশ থেকে পপ-আপ এলাউ করুন।");
            return;
          }
          
          let tableRows = '';
          data.forEach(c => {
            // GS কোড অনুযায়ী কলাম ম্যাপিং
            tableRows += `
              <tr>
                <td style="text-align:center; font-weight:bold;">${c.code || c.id || '-'}</td>
                <td>${c.name || '-'}</td>
                <td style="text-align:center;">${c.mobile || '-'}</td>
                <td>${c.area || '-'}</td>
                <td style="text-align:center;">${c.type || '-'}</td>
                <td style="text-align:center;">${c.payment || '-'}</td>
              </tr>`;
          });

          const htmlContent = `
            <html>
            <head>
              <title>Customer List - Print View</title>
              <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
              <style>
                @page { size: A4; margin: 10mm; }
                body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
                .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
                table { width: 100%; border-collapse: collapse !important; }
                th { background-color: #f8f9fa !important; border: 1px solid #444 !important; padding: 12px 8px; font-size: 14px; }
                td { border: 1px solid #444 !important; padding: 10px 8px; font-size: 13px; }
                .btn-print { 
                  position: fixed; top: 20px; right: 20px; 
                  padding: 10px 25px; background: #0d6efd; color: #fff; 
                  border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
                }
                @media print { .btn-print { display: none; } }
              </style>
            </head>
            <body>
              <button class="btn-print" onclick="window.print()">PRINT NOW</button>
              <div class="header">
                <h2 style="margin:0; color:#2c3e50;">CUSTOMER DIRECTORY</h2>
                <p style="margin:5px 0;">Total Customers: ${data.length}</p>
                <p style="font-size:11px; color:#7f8c8d;">Printed on: ${new Date().toLocaleString()}</p>
              </div>
              <table class="table table-bordered">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Customer Name</th>
                    <th>Mobile</th>
                    <th>Area</th>
                    <th>Type</th>
                    <th>Payment</th>
                  </tr>
                </thead>
                <tbody>
                  ${tableRows}
                </tbody>
              </table>
            </body>
            </html>
          `;

          printWindow.document.write(htmlContent);
          printWindow.document.close();
        })
        .withFailureHandler(err => {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-print"></i> VIEW & PRINT LIST';
          alert("Error fetching data: " + err);
        })
        .getAllCustomers();
    }

    function toggleForm(mode) {
      currentMode = mode;
      const section = document.getElementById('formSection');
      const card = document.getElementById('cardTheme');
      const btn = document.getElementById('submitBtn');
      const searchBox = document.getElementById('searchContainer');
      
      clearInputs();
      section.classList.remove('hidden-section');

      if(mode === 'NEW') {
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-plus text-success"></i> NEW ENTRY';
        card.className = "card shadow-lg p-4 new-entry-card";
        btn.className = "btn btn-success btn-lg px-5 shadow text-white fw-bold";
        btn.innerText = "SAVE NEW";
        searchBox.classList.add('hidden-section');
        google.script.run.withSuccessHandler(id => document.getElementById('cCode').value = id).getNextId();
      } else {
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-edit text-warning"></i> UPDATE DATA';
        card.className = "card shadow-lg p-4 update-card";
        btn.className = "btn btn-warning btn-lg px-5 shadow text-dark fw-bold";
        btn.innerText = "UPDATE DATA";
        searchBox.classList.remove('hidden-section');
        loadCustomerList();
      }
    }

    function loadCustomerList() {
      google.script.run.withSuccessHandler(data => {
        allCustomers = data;
        const list = document.getElementById('customerList');
        list.innerHTML = "";
        data.forEach(c => {
          let opt = document.createElement('option');
          opt.value = `${c.code || c.id} | ${c.name}`;
          list.appendChild(opt);
        });
      }).getAllCustomers();
    }

    function autoFill(val) {
      if(!val.includes(" | ")) return;
      const id = val.split(" | ")[0];
      const customer = allCustomers.find(c => (c.code || c.id) === id);
      if(customer) {
        document.getElementById('cCode').value = customer.code || customer.id;
        document.getElementById('cName').value = customer.name;
        document.getElementById('cMob').value = customer.mobile;
        document.getElementById('cArea').value = customer.area;
        document.getElementById('cAddr').value = customer.address;
        document.getElementById('cType').value = customer.type || "Retail";
        document.getElementById('cPay').value = customer.payment || "Cash";
      }
    }

    function clearInputs() {
      const ids = ['cCode', 'cName', 'cMob', 'cArea', 'cAddr', 'cSearch'];
      ids.forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = ""; });
    }

    function closeForm() { document.getElementById('formSection').classList.add('hidden-section'); }

    document.getElementById('submitBtn').onclick = function() {
      const btn = this;
      let data = {
        code: document.getElementById('cCode').value,
        name: document.getElementById('cName').value,
        mobile: document.getElementById('cMob').value,
        area: document.getElementById('cArea').value,
        address: document.getElementById('cAddr').value,
        type: document.getElementById('cType').value,
        payment: document.getElementById('cPay').value,
        mode: currentMode
      };
      
      if(!data.name || !data.code) return alert("Please fill Name and ID!");

      btn.disabled = true;
      btn.innerHTML = 'Processing...';

      google.script.run
        .withSuccessHandler(res => {
          alert(res);
          if (currentMode === 'UPDATE') { loadCustomerList(); }
          clearInputs();
          closeForm();
          btn.disabled = false;
          btn.innerText = (currentMode === 'NEW') ? "SAVE NEW" : "UPDATE DATA";
        })
        .withFailureHandler(err => {
          alert("Error: " + err);
          btn.disabled = false;
        })
        .saveCustomer(data, currentMode);
    };
</script>
</body>
</html>
